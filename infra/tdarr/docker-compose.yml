version: "3.8"

services:
  tdarr-server:
    container_name: tdarr_server
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - PUID=0
      - PGID=0
      - UMASK=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
    ports:
      - 8265:8265
      - 8266:8266
    volumes:
      - /tmp/zfsv3/nvme14/13918962622/data/tdarr/server:/app/server
      - /tmp/zfsv3/nvme14/13918962622/data/tdarr/configs:/app/configs
      - /tmp/zfsv3/nvme14/13918962622/data/xiaomi_camera_videos:/mnt/source_videos:ro
      - /tmp/zfsv3/nvme14/13918962622/data/export_videos:/mnt/export_videos

  tdarr-node:
    container_name: tdarr_node
    image: ghcr.io/haveagitgat/tdarr_node:latest
    restart: always
    depends_on:
      - tdarr-server
    environment:
      - TZ=Asia/Shanghai
      - PUID=0
      - PGID=0
      - UMASK=002
      - nodeID=Z4Pro-N100-Node
      - serverIP=tdarr_server
      - serverPort=8266
    # 🚀 核心优化：把极空间 N100 的 Intel 核显硬件加速（VAAPI/QSV）环境注入进 Node 容器
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /tmp/zfsv3/nvme14/13918962622/data/tdarr/configs:/app/configs
      - /tmp/zfsv3/nvme14/13918962622/data/scripts:/app/scripts
      - /tmp/zfsv3/nvme14/13918962622/data/tdarr/transcode_cache:/temp
      - /tmp/zfsv3/nvme14/13918962622/data/xiaomi_camera_videos:/mnt/source_videos:ro
      - /tmp/zfsv3/nvme14/13918962622/data/export_videos:/mnt/export_videos
      - /tmp/zfsv3/nvme14/13918962622/data/temp_workspace:/tmp
      # 🆕 客厅 Xiaomi 4K 摄像头（低优先级，SATA13 盘）
      - /tmp/zfsv3/sata13/13918962622/data/XiaomiCamera_00_B888808E0906:/mnt/source_videos_livingroom:ro
      - /tmp/zfsv3/nvme14/13918962622/data/export_videos_livingroom:/mnt/export_videos_livingroom
      # 🆕 书房新 Xiaomi 4K 摄像头（SATA13 盘）
      - /tmp/zfsv3/sata13/13918962622/data/XiaomiCamera_01_B88880D304D1:/mnt/source_study:ro
      # 🧪 测试输出目录（TEST_MODE=true 时使用，不影响生产数据）
      - /tmp/zfsv3/nvme14/13918962622/data/export_videos_test:/mnt/export_videos_test
      # 💾 数据备份目录（GAS Sheet 每日备份）
      - /tmp/zfsv3/nvme14/13918962622/data/backups:/mnt/backups
