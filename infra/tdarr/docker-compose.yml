version: "3.8"

services:
  tdarr-server:
    container_name: tdarr_server
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - PUID=0
      - PGID=0
      - UMASK=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
    ports:
      - 8265:8265 
      - 8266:8266 
    volumes:
      - /tmp/zfsv3/nvme14/13918962622/data/tdarr/server:/app/server
      - /tmp/zfsv3/nvme14/13918962622/data/tdarr/configs:/app/configs
      - /tmp/zfsv3/nvme14/13918962622/data/xiaomi_camera_videos:/mnt/source_videos
      - /tmp/zfsv3/nvme14/13918962622/data/export_videos:/mnt/export_videos

  tdarr-node:
    container_name: tdarr_node
    image: ghcr.io/haveagitgat/tdarr_node:latest
    restart: always
    depends_on:
      - tdarr-server
    environment:
      - TZ=Asia/Shanghai
      - PUID=0
      - PGID=0
      - UMASK=002
      - nodeID=Z4Pro-N100-Node
      - serverIP=tdarr_server 
      - serverPort=8266
    # 🚀 核心优化：把极空间 N100 的 Intel 核显硬件加速（VAAPI/QSV）环境注入进 Node 容器
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /tmp/zfsv3/nvme14/13918962622/data/tdarr/configs:/app/configs
      - /tmp/zfsv3/nvme14/13918962622/data/scripts:/app/scripts
      - /tmp/zfsv3/nvme14/13918962622/data/tdarr/transcode_cache:/temp
      - /tmp/zfsv3/nvme14/13918962622/data/xiaomi_camera_videos:/mnt/source_videos
      - /tmp/zfsv3/nvme14/13918962622/data/export_videos:/mnt/export_videos
      - /tmp/zfsv3/nvme14/13918962622/data/监控中心/2c7835a636a84263914a8e58dbd19041:/mnt/source_videos_yingshi
      - /tmp/zfsv3/nvme14/13918962622/data/export_videos_yingshi:/mnt/export_videos_yingshi 
      - /tmp/zfsv3/nvme14/13918962622/data/temp_workspace:/tmp

