# ==============================================================================
# Emma Focus — 多项目统一 Docker Compose
#
# 所有 web 服务通过此文件统一管理。
# 操作方式：docker compose -p site up -d
#
# 添加新后端项目：
# 1. 在 backend/ 下创建项目目录
# 2. 在 conf.d/ 下创建相应的 nginx 配置片段
# 3. 在此文件添加新 service
# ==============================================================================

services:
  # ===== nginx 前端（所有项目共用）=====
  site-frontend:
    image: nginx:alpine
    container_name: site_frontend
    ports:
      - "${NGINX_PORT:-8888}:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./conf.d:/etc/nginx/conf.d/projects:ro
    restart: always
    networks:
      - site_network

  # ===== Emma Focus 后端 =====
  site-backend:
    image: python:3.10-alpine
    container_name: site_backend
    ports:
      - "${EMMA_PORT:-5000}:80"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    working_dir: /app
    command: >
      sh -c "pip install fastapi uvicorn python-multipart -q && nohup python3 -m uvicorn poc_main:app --host 0.0.0.0 --port 81 > /tmp/poc.log 2>&1 & nohup python3 -m uvicorn main:app --host 0.0.0.0 --port 80 > /tmp/main.log 2>&1 & wait"
    restart: always
    networks:
      - site_network

networks:
  site_network:
    driver: bridge
