# ==============================================================================
# Emma Focus — nginx 主配置
#
# 多项目共享同一 nginx 实例。
# 每个项目在 conf.d/ 下创建独立的 .conf 文件，不修改主配置。
# ==============================================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Emma Focus (根路径)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PoC API 代理（独立 SQLite，不影响生产）
    # 必须放在 /api/ 前面，否则被前缀匹配先捕获
    location /api/poc/ {
        proxy_pass http://site_backend:81;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # 通用 API 代理（Emma Focus 生产 API）
    location /api/ {
        proxy_pass http://site_backend:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # PoC 测试页面
    location /poc/ {
        alias /usr/share/nginx/html/poc/;
        try_files $uri $uri/ /poc/index.html;
    }

    # 其他项目的配置片段（放在 conf.d/ 目录下）
    include /etc/nginx/conf.d/projects/*.conf;
}