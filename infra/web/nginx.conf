server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Avatar API 反向代理到 fastapi 后端（通过宿主机 IP）
    location /api/avatar/ {
        proxy_pass http://192.168.6.108:5000/api/avatar/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://192.168.6.108:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # PoC API 代理到后端（去掉 /poc 前缀）
    location /poc/api/ {
        rewrite ^/poc(/api/.*)$ $1 break;
        proxy_pass http://site_backend:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # PoC 测试页面（静态 HTML）
    location = /poc/ {
        root /usr/share/nginx/html;
        try_files /poc_index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}