# ==============================================================================
# Emma Focus — nginx 配置
#
# 多项目共享同一 nginx 实例。
# 每个项目使用独立的 location 块，避免首页冲突。
#
# 添加新项目时：
# 1. 在 html/ 下创建项目子目录
# 2. 添加对应的 location /project-name/ 块
# 3. 不要修改根 location / 块（Emma Focus 保留）
# ==============================================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ===== Emma Focus (根路径，保留) =====
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== 通用 API 代理 =====
    location /api/avatar/ {
        proxy_pass http://site_backend:80/api/avatar/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://site_backend:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ===== Family Time Flow (子路径) =====
    location /family-time-flow/ {
        alias /usr/share/nginx/html/family-time-flow/;
        try_files $uri $uri/ /family-time-flow/index.html;
    }
}