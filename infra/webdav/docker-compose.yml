version: '3'

services:
  rclone-webdav:
    image: rclone/rclone:latest
    container_name: clinedeploy-rclone-webdav
    restart: always
    ports:
      - "${WEBDAV_PORT:-8889}:8080"
    volumes:
      - /tmp/zfsv3/nvme14/13918962622/data/scripts:/data/scripts
      - /tmp/zfsv3/nvme14/13918962622/data/docker:/data/docker
      - /tmp/zfsv3/nvme14/13918962622/data/tdarr:/data/tdarr
      - /tmp/zfsv3/nvme14/13918962622/data/webdav:/data/webdav
      - /tmp/zfsv3/nvme14/13918962622/data/watchtower:/data/watchtower
      - /tmp/zfsv3/sata11/13918962622/data/06_Docker/Immich:/data/immich
    # ⚠️ rclone 镜像的 ENTRYPOINT 是 rclone，不能用 sh -c 包装
    # 直接用 --user/--pass 参数（密码从同目录 .env 文件读取）
    command:
      - serve
      - webdav
      - /data
      - --addr
      - ":8080"
      - --user
      - "${WEBDAV_USER}"
      - --pass
      - "${WEBDAV_PASS}"
      - --vfs-cache-mode
      - writes
